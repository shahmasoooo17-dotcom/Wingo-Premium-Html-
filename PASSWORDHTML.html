<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎰 Wingo Signal – Key System</title>
  <style>
    /* ─── Reset & Base ─── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0e14;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(255,50,50,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 50%, rgba(50,50,255,0.08) 0%, transparent 60%);
      padding: 20px;
      margin: 0;
    }

    .container {
      background: #141a24;
      border-radius: 32px;
      padding: 40px 50px 45px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.04);
      text-align: center;
      position: relative;
    }

    /* ─── Overlay (Login / Admin) ─── */
    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(20,26,36,0.96);
      border-radius: 32px;
      z-index: 10;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
      backdrop-filter: blur(4px);
    }
    .overlay.active {
      display: flex;
    }
    .overlay h2 {
      color: #fff;
      font-size: 24px;
      margin-bottom: 16px;
    }
    .overlay p {
      color: #8892a8;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .overlay input {
      background: #0d111a;
      border: 1px solid #2a3442;
      color: #fff;
      padding: 14px 18px;
      border-radius: 60px;
      width: 100%;
      max-width: 300px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
      margin-bottom: 12px;
      text-align: center;
    }
    .overlay input:focus {
      border-color: #f7971e;
    }
    .overlay button {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      border: none;
      border-radius: 60px;
      padding: 12px 32px;
      font-weight: 800;
      font-size: 16px;
      color: #141a24;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(247,151,30,0.25);
      width: 100%;
      max-width: 300px;
    }
    .overlay button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(247,151,30,0.4);
    }
    .overlay .error {
      color: #ff4444;
      font-size: 13px;
      margin-top: 8px;
      min-height: 20px;
    }
    .overlay .hint {
      color: #5a6a82;
      font-size: 12px;
      margin-top: 8px;
      min-height: 20px;
    }
    /* ─── Admin toggle link ─── */
    .overlay .admin-toggle-link {
      color: #5a6a82;
      font-size: 13px;
      cursor: pointer;
      margin-top: 14px;
      text-decoration: underline dotted;
      transition: color 0.2s;
    }
    .overlay .admin-toggle-link:hover {
      color: #f7971e;
    }

    /* ─── Admin Panel (inside overlay) ─── */
    .admin-section {
      display: none;
      margin-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 16px;
      width: 100%;
      max-width: 300px;
    }
    .admin-section.visible {
      display: block;
    }
    .admin-section .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .admin-section .row button {
      flex: 1;
      min-width: 60px;
      padding: 8px 12px;
      font-size: 13px;
      background: #1e2634;
      color: #b0c0d8;
      border: 1px solid #2a3442;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
    }
    .admin-section .row button:hover {
      background: #2a3649;
      color: #fff;
    }
    .admin-section .row button.active {
      background: #f7971e;
      color: #141a24;
      border-color: #f7971e;
    }
    .admin-section .row input {
      flex: 2;
      min-width: 80px;
      padding: 8px 12px;
      background: #0d111a;
      border: 1px solid #2a3442;
      color: #fff;
      border-radius: 40px;
      font-size: 13px;
      text-align: center;
    }
    .admin-section .gen-btn {
      background: linear-gradient(135deg, #f7971e, #ffd200) !important;
      color: #141a24 !important;
      font-weight: 700;
      border: none !important;
    }
    .admin-section .gen-btn:hover {
      transform: scale(1.02);
    }
    .admin-section .key-list {
      margin-top: 12px;
      max-height: 100px;
      overflow-y: auto;
      text-align: left;
      font-size: 12px;
      color: #7b8aa3;
      background: #0d111a;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid #1e2634;
    }
    .admin-section .key-list .item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .admin-section .key-list .item span:last-child {
      color: #f7971e;
    }
    .admin-section .key-list .item.expired {
      opacity: 0.4;
    }
    .admin-section .key-list .item .del {
      color: #ff4444;
      cursor: pointer;
      margin-left: 8px;
      font-weight: 700;
    }

    /* ─── Header ─── */
    .header .badge {
      display: inline-block;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 16px;
      border-radius: 20px;
      margin-bottom: 6px;
    }
    .header h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .header h1 span {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      color: #8892a8;
      font-size: 14px;
      margin-top: 4px;
    }

    /* ─── Signal Display ─── */
    .signal-box {
      background: #0d111a;
      border-radius: 20px;
      padding: 30px 20px 25px;
      margin: 28px 0;
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s ease;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .signal-box .glow {
      position: absolute;
      inset: -50%;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      transition: all 0.6s ease;
      pointer-events: none;
    }
    .signal-box .label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #5a6a82;
      font-weight: 600;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }
    .signal-box .color-display {
      font-size: 72px;
      font-weight: 800;
      line-height: 1.1;
      position: relative;
      z-index: 1;
      transition: all 0.15s ease;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .signal-box .color-display .emoji { font-size: 56px; line-height: 1; }
    .signal-box .color-display .name { font-size: 32px; font-weight: 700; letter-spacing: 1px; }
    .signal-box .sub-text {
      font-size: 14px;
      color: #5a6a82;
      margin-top: 8px;
      position: relative;
      z-index: 1;
      letter-spacing: 0.5px;
    }
    .signal-box.red { border-color: rgba(255,50,50,0.4); }
    .signal-box.red .glow { background: #ff3333; opacity: 0.25; }
    .signal-box.red .color-display .name { color: #ff4444; }
    .signal-box.green { border-color: rgba(50,255,50,0.4); }
    .signal-box.green .glow { background: #33ff33; opacity: 0.20; }
    .signal-box.green .color-display .name { color: #44ff44; }
    .signal-box.violet { border-color: rgba(180,80,255,0.4); }
    .signal-box.violet .glow { background: #a855f7; opacity: 0.25; }
    .signal-box.violet .color-display .name { color: #c084fc; }
    .signal-box.spinning .color-display { animation: spinBlur 0.12s steps(1) infinite; }
    @keyframes spinBlur {
      0%   { filter: blur(0px); transform: scale(1); }
      50%  { filter: blur(4px); transform: scale(0.96); }
      100% { filter: blur(0px); transform: scale(1); }
    }

    .btn-generate {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      border: none;
      border-radius: 60px;
      padding: 16px 20px;
      width: 100%;
      font-size: 20px;
      font-weight: 800;
      color: #141a24;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 28px rgba(247,151,30,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .btn-generate:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(247,151,30,0.4);
    }
    .btn-generate:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .history {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .history .h-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #3d4a60;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .history .dots {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 32px;
    }
    .history .dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-block;
      transition: all 0.25s ease;
      box-shadow: 0 0 12px rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .history .dot.red   { background: #ff3333; box-shadow: 0 0 16px rgba(255,50,50,0.3); }
    .history .dot.green { background: #33ff33; box-shadow: 0 0 16px rgba(50,255,50,0.25); }
    .history .dot.violet{ background: #a855f7; box-shadow: 0 0 16px rgba(168,85,247,0.3); }
    .history .dot.empty {
      background: #1e2634;
      border: 1px dashed #2a3442;
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .container { padding: 24px 18px 30px; }
      .signal-box .color-display { font-size: 54px; min-height: 80px; }
      .signal-box .color-display .emoji { font-size: 42px; }
      .signal-box .color-display .name { font-size: 26px; }
      .btn-generate { font-size: 17px; padding: 14px 16px; }
      .header h1 { font-size: 22px; }
      .overlay { padding: 20px; }
    }
  </style>
</head>
<body>

<div class="container" id="appContainer">

  <!-- ─── Overlay (Login / Admin) ─── -->
  <div class="overlay active" id="overlay">
    <h2 id="overlayTitle">🔑 Enter Key</h2>
    <p id="overlayDesc">Paste your activation key to unlock the signal generator.</p>
    <input type="text" id="keyInput" placeholder="Paste your key here..." />
    <button id="overlayBtn">Unlock</button>
    <div class="error" id="overlayError"></div>
    <div class="hint" id="overlayHint"></div>

    <!-- Admin toggle link (requires master key) -->
    <div class="admin-toggle-link" id="adminToggleLink">🔑 Admin Panel</div>

    <!-- Admin section (hidden by default) -->
    <div class="admin-section" id="adminSection">
      <div class="row">
        <button data-hours="2" class="active">2h</button>
        <button data-hours="24">24h</button>
        <input type="number" id="customHours" placeholder="Custom h" min="1" />
        <button class="gen-btn" id="genKeyBtn">➕ Generate</button>
      </div>
      <div class="key-list" id="keyList">
        <div style="color:#3d4a60; text-align:center;">No keys generated yet.</div>
      </div>
    </div>
  </div>

  <!-- ─── Header ─── -->
  <div class="header">
    <div class="badge">🎲 Live Signal</div>
    <h1><span>Wingo</span> Color Predictor</h1>
    <p>Spin the wheel &amp; get your color signal</p>
  </div>

  <!-- Signal Display -->
  <div class="signal-box" id="signalBox">
    <div class="glow" id="glow"></div>
    <div class="label">🎯 Prediction</div>
    <div class="color-display" id="colorDisplay">
      <span class="emoji">❓</span>
      <span class="name" id="colorName">—</span>
    </div>
    <div class="sub-text" id="subText">Tap SPIN to get your signal</div>
  </div>

  <!-- Generate Button -->
  <button class="btn-generate" id="generateBtn" disabled>
    <span class="icon">🔒</span>
    <span>LOCKED</span>
  </button>

  <!-- History -->
  <div class="history">
    <div class="h-label">📋 Last 12 Signals</div>
    <div class="dots" id="historyDots"></div>
  </div>
</div>

<script>
  // ─── Config ────────────────────────────────────────────────────────
  const COLORS = [
    { id: 'red',    emoji: '🔴', name: 'Red',    class: 'red' },
    { id: 'green',  emoji: '🟢', name: 'Green',  class: 'green' },
    { id: 'violet', emoji: '🟣', name: 'Violet', class: 'violet' }
  ];
  const HISTORY_MAX = 12;
  const MASTER_KEY = 'masood123';   // <-- Master key for admin panel

  // ─── State ─────────────────────────────────────────────────────────
  let history = [];
  let isSpinning = false;
  let currentKey = null;          // the key string currently active
  let validUntil = null;          // timestamp when key expires
  let isAdminVisible = false;     // whether admin section is shown

  // ─── DOM refs ──────────────────────────────────────────────────────
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayDesc = document.getElementById('overlayDesc');
  const keyInput = document.getElementById('keyInput');
  const overlayBtn = document.getElementById('overlayBtn');
  const overlayError = document.getElementById('overlayError');
  const overlayHint = document.getElementById('overlayHint');
  const adminToggleLink = document.getElementById('adminToggleLink');
  const adminSection = document.getElementById('adminSection');
  const genKeyBtn = document.getElementById('genKeyBtn');
  const customHours = document.getElementById('customHours');
  const keyList = document.getElementById('keyList');

  const signalBox = document.getElementById('signalBox');
  const colorDisplay = document.getElementById('colorDisplay');
  const colorName = document.getElementById('colorName');
  const subText = document.getElementById('subText');
  const generateBtn = document.getElementById('generateBtn');
  const historyDots = document.getElementById('historyDots');

  // ─── Key Storage ──────────────────────────────────────────────────
  function getStoredKeys() {
    try {
      return JSON.parse(localStorage.getItem('wingo_keys')) || {};
    } catch { return {}; }
  }
  function saveKeys(keys) {
    localStorage.setItem('wingo_keys', JSON.stringify(keys));
  }
  function getValidKey(key) {
    const keys = getStoredKeys();
    const entry = keys[key];
    if (!entry) return null;
    if (Date.now() > entry.expiry) {
      return null;
    }
    return entry;
  }
  function generateKey(expiryHours) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let key = '';
    for (let i = 0; i < 12; i++) key += chars[Math.floor(Math.random() * chars.length)];
    const keys = getStoredKeys();
    keys[key] = { expiry: Date.now() + expiryHours * 3600 * 1000 };
    saveKeys(keys);
    return key;
  }
  function deleteKey(key) {
    const keys = getStoredKeys();
    delete keys[key];
    saveKeys(keys);
  }

  // ─── UI: render key list (admin) ─────────────────────────────────
  function renderKeyList() {
    const keys = getStoredKeys();
    const entries = Object.entries(keys);
    if (entries.length === 0) {
      keyList.innerHTML = '<div style="color:#3d4a60; text-align:center;">No keys generated yet.</div>';
      return;
    }
    let html = '';
    const now = Date.now();
    entries.forEach(([k, v]) => {
      const expired = now > v.expiry;
      const expiryStr = new Date(v.expiry).toLocaleString();
      html += `<div class="item ${expired ? 'expired' : ''}">
        <span><strong>${k}</strong> ${expired ? '⏰ expired' : '✅ active'}</span>
        <span>${expiryStr} <span class="del" data-key="${k}">✕</span></span>
      </div>`;
    });
    keyList.innerHTML = html;
    // attach delete listeners
    keyList.querySelectorAll('.del').forEach(el => {
      el.addEventListener('click', function() {
        const key = this.dataset.key;
        if (confirm(`Delete key "${key}"?`)) {
          deleteKey(key);
          renderKeyList();
          // if current key deleted, lock again
          if (currentKey === key) {
            currentKey = null;
            validUntil = null;
            lockApp('Your key was deleted.');
          }
        }
      });
    });
  }

  // ─── Lock / Unlock app ────────────────────────────────────────────
  function lockApp(message) {
    currentKey = null;
    validUntil = null;
    generateBtn.disabled = true;
    generateBtn.innerHTML = `<span class="icon">🔒</span><span>LOCKED</span>`;
    overlay.classList.add('active');
    overlayTitle.textContent = '🔑 Enter Key';
    overlayDesc.textContent = message || 'Your session has expired. Enter a valid key.';
    overlayError.textContent = '';
    overlayHint.textContent = '';
    keyInput.value = '';
    overlayBtn.textContent = 'Unlock';
    // hide admin section if not visible
    if (!isAdminVisible) adminSection.classList.remove('visible');
  }

  function unlockApp(key) {
    const entry = getValidKey(key);
    if (!entry) {
      overlayError.textContent = '❌ Invalid or expired key.';
      return false;
    }
    currentKey = key;
    validUntil = entry.expiry;
    generateBtn.disabled = false;
    generateBtn.innerHTML = `<span class="icon">🎰</span><span>SPIN</span>`;
    overlay.classList.remove('active');
    overlayError.textContent = '';
    // show expiry hint
    const left = Math.floor((validUntil - Date.now()) / 60000);
    subText.textContent = `✅ Active – key expires in ${left} minutes.`;
    return true;
  }

  // ─── Admin toggle (protected by master key) ──────────────────────
  adminToggleLink.addEventListener('click', function() {
    if (isAdminVisible) {
      // If admin is already visible, just hide it
      isAdminVisible = false;
      adminSection.classList.remove('visible');
      overlayHint.textContent = '';
      return;
    }

    // Prompt for master key
    const entered = prompt('Enter master key to access admin panel:');
    if (entered === null) {
      // user cancelled
      return;
    }
    if (entered === MASTER_KEY) {
      isAdminVisible = true;
      adminSection.classList.add('visible');
      renderKeyList();
      overlayHint.textContent = '🔑 Admin panel active. Click "Admin Panel" again to hide.';
    } else {
      overlayError.textContent = '❌ Incorrect master key.';
      // clear error after a few seconds
      setTimeout(() => overlayError.textContent = '', 3000);
    }
  });

  // ─── Overlay button logic ─────────────────────────────────────────
  overlayBtn.addEventListener('click', function() {
    const input = keyInput.value.trim();
    if (!input) {
      overlayError.textContent = 'Please enter a key.';
      return;
    }
    const success = unlockApp(input);
    if (!success) {
      // error already set
    }
  });

  // Allow Enter key on input
  keyInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') overlayBtn.click();
  });

  // ─── Generate key (admin) ─────────────────────────────────────────
  genKeyBtn.addEventListener('click', function() {
    let hours = parseInt(customHours.value);
    if (!hours || hours < 1) {
      // check preset buttons
      const activePreset = document.querySelector('.admin-section .row button.active');
      if (activePreset) hours = parseInt(activePreset.dataset.hours);
      else hours = 2;
    }
    const key = generateKey(hours);
    renderKeyList();
    // auto‑copy key to clipboard
    navigator.clipboard.writeText(key).catch(() => {});
    overlayHint.textContent = `✅ Key generated: ${key} (copied to clipboard)`;
    setTimeout(() => overlayHint.textContent = '', 5000);
  });

  // Preset buttons highlight
  document.querySelectorAll('.admin-section .row button[data-hours]').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.admin-section .row button[data-hours]').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      customHours.value = this.dataset.hours;
    });
  });

  // ─── Signal Generator (unchanged) ──────────────────────────────────
  function renderHistory() {
    let html = '';
    const length = history.length;
    for (let i = 0; i < HISTORY_MAX; i++) {
      const idx = length - 1 - i;
      if (idx >= 0 && history[idx]) {
        const c = history[idx];
        html += `<span class="dot ${c.id}" title="${c.name}"></span>`;
      } else {
        html += `<span class="dot empty"></span>`;
      }
    }
    historyDots.innerHTML = html;
  }

  function applyColor(color) {
    signalBox.className = 'signal-box ' + color.class;
    colorDisplay.innerHTML = `
      <span class="emoji">${color.emoji}</span>
      <span class="name">${color.name}</span>
    `;
    colorName.textContent = color.name;
  }

  function getRandomColor() {
    return COLORS[Math.floor(Math.random() * COLORS.length)];
  }

  function spin() {
    if (isSpinning) return;
    if (!currentKey || !validUntil || Date.now() > validUntil) {
      lockApp('Your session has expired. Please re‑enter a valid key.');
      return;
    }
    isSpinning = true;
    generateBtn.disabled = true;
    generateBtn.innerHTML = `<span class="icon">⏳</span><span>SPINNING...</span>`;

    signalBox.classList.remove('red', 'green', 'violet');
    signalBox.classList.add('spinning');

    let count = 0;
    const maxSteps = 12 + Math.floor(Math.random() * 8);
    const interval = setInterval(() => {
      const rand = getRandomColor();
      colorDisplay.innerHTML = `
        <span class="emoji">${rand.emoji}</span>
        <span class="name" style="color:rgba(255,255,255,0.3);">${rand.name}</span>
      `;
      count++;
      if (count >= maxSteps) {
        clearInterval(interval);
        const finalColor = getRandomColor();
        applyColor(finalColor);
        history.push(finalColor);
        if (history.length > HISTORY_MAX) history.shift();
        renderHistory();
        const time = new Date().toLocaleTimeString();
        subText.textContent = `📊 Signal generated at ${time}`;
        signalBox.classList.remove('spinning');
        isSpinning = false;
        generateBtn.disabled = false;
        generateBtn.innerHTML = `<span class="icon">🎰</span><span>SPIN</span>`;
      }
    }, 80 + Math.random() * 40);
  }

  // ─── Attach spin event ─────────────────────────────────────────────
  generateBtn.addEventListener('click', spin);
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !e.repeat) {
      e.preventDefault();
      spin();
    }
  });

  // ─── Init ──────────────────────────────────────────────────────────
  function init() {
    // Check if a valid key already exists in localStorage (from previous session)
    const keys = getStoredKeys();
    let found = false;
    for (const [k, v] of Object.entries(keys)) {
      if (Date.now() < v.expiry) {
        // use this key
        found = true;
        unlockApp(k);
        break;
      }
    }
    if (!found) {
      lockApp('Please enter a valid activation key.');
    }
    renderHistory();
    // Admin section hidden by default
    adminSection.classList.remove('visible');
    isAdminVisible = false;
  }

  init();
</script>
</body>
</html>
